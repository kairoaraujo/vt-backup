# Dependabot keeps dependencies current with automated PRs.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Go module dependencies.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - go
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
    groups:
      # Batch minor/patch bumps into a single PR to cut review noise.
      go-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows. Dependabot understands SHA pins and
  # updates both the SHA and the trailing `# vX.Y.Z` version comment.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        update-types:
          - minor
          - patch
